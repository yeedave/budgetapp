name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build React frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Run tests
        run: pytest

      - name: Build .exe
        run: pyinstaller budgetapp.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BudgetApp-Windows
          path: dist/BudgetApp/
          retention-days: 30
